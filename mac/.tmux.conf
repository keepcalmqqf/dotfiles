# ===== Terminal & colors =====
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ===== Usability =====
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g set-clipboard on
set -g detach-on-destroy off        # switch to another session instead of detaching
set -g display-time 1500
set -g display-panes-time 2000
setw -g mode-keys vi
setw -g aggressive-resize on        # multi-client: resize per-client, not to smallest
setw -g monitor-activity on         # highlight windows with output in status bar
set -g visual-activity off

# ===== Key bindings (prefix: C-b) =====
# Split panes with | and -, keep current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation (overrides prefix+l = last-window; use prefix+Tab instead)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Tab last-window
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Switch windows without prefix; reorder with prefix + < / >
bind -n S-Left previous-window
bind -n S-Right next-window
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Toggle synchronize-panes (type into all panes at once)
bind S setw synchronize-panes

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ===== Copy mode (vi keys, straight to macOS clipboard) =====
set -s copy-command "pbcopy"
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ===== Status bar (Catppuccin Mocha) =====
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80
# Session block turns red while the prefix key is held
set -g status-left "#{?client_prefix,#[bg=#f38ba8],#[bg=#89b4fa]}#[fg=#1e1e2e,bold] #S #{?client_prefix,#[fg=#f38ba8],#[fg=#89b4fa]}#[bg=#1e1e2e] "
set -g status-right "#[fg=#a6e3a1]#H #[fg=#cdd6f4]| #[fg=#f9e2af]%Y-%m-%d %H:%M "
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#f5c2e7,bold] #I:#W "
setw -g window-status-activity-style "fg=#f9e2af"
setw -g pane-border-style "fg=#45475a"
setw -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#1e1e2e,fg=#f9e2af,bold"
