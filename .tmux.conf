# ===== Terminal & colors =====
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ===== Usability =====
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on

# Split panes with | and -, keep current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ===== Status bar =====
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e] "
set -g status-right "#[fg=#a6e3a1]#H #[fg=#cdd6f4]| #[fg=#f9e2af]%Y-%m-%d %H:%M "
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#f5c2e7,bold] #I:#W "
setw -g pane-border-style "fg=#45475a"
setw -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#1e1e2e,fg=#f9e2af,bold"
